name: Test (Install)

permissions:
  contents: read

"on":
  push:
    branches: [main]
    paths:
      - python/**
      - typescript/**
      - .github/workflows/test_install.yml
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    outputs:
      hit: ${{ steps.filter.outputs.hit }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            hit:
              - 'python/**'
              - 'typescript/**'
              - '.github/workflows/test_install.yml'

  python-install:
    needs: changes
    if: ${{ !cancelled() && (github.event_name != 'pull_request' || needs.changes.outputs.hit == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Base install (no extras) on 3.11 and 3.12
        working-directory: python
        run: |
          for ver in 3.11 3.12; do
            rm -rf .venv-min
            uv venv --python "$ver" .venv-min
            uv pip install --python .venv-min/bin/python .
            .venv-min/bin/python - <<'PY'
          import importlib.util
          banned = ["numpy", "pypdfium2", "PIL", "mfusepy", "opendal", "aioboto3",
                    "pandas", "redis", "asyncssh", "motor", "asyncpg", "av"]
          present = [m for m in banned if importlib.util.find_spec(m) is not None]
          assert not present, f"optional deps leaked into base install: {present}"
          print("OK: no optional deps in base install")
          PY
            .venv-min/bin/python - <<'PY'
          import asyncio

          import mirage

          async def main():
              ws = mirage.Workspace({"/ram": mirage.RAMResource()},
                                    mode=mirage.MountMode.WRITE)
              out = await ws.execute("echo hello | wc -c")
              assert out.exit_code == 0 and out.stdout == b"6\n", out
              out = await ws.execute("echo hi > /ram/a.txt")
              assert out.exit_code == 0, out
              out = await ws.execute("cat /ram/a.txt")
              assert out.exit_code == 0 and out.stdout == b"hi\n", out
              print("OK: core smoke passed on base install")

          asyncio.run(main())
          PY
            .venv-min/bin/mirage --help > /dev/null
            echo "OK: base install on $ver"
          done

      - name: Install each extra into a fresh venv and import its entry module
        working-directory: python
        run: |
          set -u
          # extra:module[:python] — each gets its own venv so an extra that
          # silently depends on another extra's packages fails here.
          entries=(
            "s3:mirage.resource.s3"
            "ssh:mirage.resource.ssh"
            "mongodb:mirage.resource.mongodb"
            "gridfs:mirage.resource.gridfs"
            "postgres:mirage.resource.postgres"
            "redis:mirage.resource.redis"
            "email:mirage.resource.email"
            "fuse:mirage.fuse.mount"
            "pdf:mirage.core.filetype.pdf"
            "parquet:mirage.core.filetype.parquet"
            "hdf5:mirage.core.filetype.hdf5"
            "nextcloud:mirage.resource.nextcloud"
            "hf:mirage.resource.hf_buckets"
            "langfuse:mirage.resource.langfuse"
            "chroma:mirage.resource.chroma"
            "lancedb:mirage.resource.lancedb"
            "qdrant:mirage.resource.qdrant"
            "databricks:mirage.resource.databricks_volume"
            "pydantic-ai:mirage.agents.pydantic_ai"
            "openai:mirage.agents.openai_agents"
            "agno:mirage.agents.agno"
            "deepagents:mirage.agents.langchain"
            "openhands:mirage.agents.openhands:3.12"
          )
          failed=()
          for entry in "${entries[@]}"; do
            IFS=: read -r extra module pyver <<< "$entry"
            pyver="${pyver:-3.11}"
            echo "::group::${extra} (${pyver})"
            rm -rf .venv-x
            if uv venv --python "$pyver" .venv-x \
                && uv pip install --python .venv-x/bin/python ".[${extra}]" \
                && .venv-x/bin/python -c "import importlib; importlib.import_module('${module}'); print('OK: ${module}')"; then
              :
            else
              echo "FAIL: ${extra}"
              failed+=("$extra")
            fi
            echo "::endgroup::"
          done
          if [ "${#failed[@]}" -gt 0 ]; then
            echo "failed extras: ${failed[*]}"
            exit 1
          fi
          echo "OK: all ${#entries[@]} extras install and import in isolation"

  ts-install:
    needs: changes
    if: ${{ !cancelled() && (github.event_name != 'pull_request' || needs.changes.outputs.hit == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.32.1

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml

      - name: Install TypeScript dependencies
        working-directory: typescript
        run: pnpm install --frozen-lockfile

      - name: Build core and node packages
        working-directory: typescript
        run: pnpm -r --filter ./packages/core --filter ./packages/node build

      - name: Pack tarballs
        working-directory: typescript
        run: |
          mkdir -p "$RUNNER_TEMP/minimal"
          pnpm --filter @struktoai/mirage-core pack --pack-destination "$RUNNER_TEMP/minimal"
          pnpm --filter @struktoai/mirage-node pack --pack-destination "$RUNNER_TEMP/minimal"

      - name: Install as a bare consumer (no optional peers)
        run: |
          cd "$RUNNER_TEMP/minimal"
          npm init -y > /dev/null
          npm install ./struktoai-mirage-core-*.tgz ./struktoai-mirage-node-*.tgz

      - name: Verify optional peers stay out of the bare install
        run: |
          cd "$RUNNER_TEMP/minimal"
          for dep in @lancedb opendal mongodb pg redis ssh2 imapflow mailparser nodemailer @zkochan; do
            if [ -e "node_modules/$dep" ]; then
              echo "FAIL: optional peer $dep leaked into bare install"
              exit 1
            fi
          done
          echo "OK: no optional peers in bare install"

      - name: Core workspace smoke test on bare install
        run: |
          cd "$RUNNER_TEMP/minimal"
          node --input-type=module - <<'JS'
          import { Workspace, RAMResource, MountMode } from '@struktoai/mirage-node'
          const dec = new TextDecoder()
          const ws = new Workspace({ '/ram': new RAMResource() }, { mode: MountMode.WRITE })
          let out = await ws.execute('echo hello | wc -c')
          if (out.exitCode !== 0 || dec.decode(out.stdout).trim() !== '6') throw new Error('pipe smoke failed')
          out = await ws.execute('echo hi > /ram/a.txt')
          if (out.exitCode !== 0) throw new Error('write smoke failed')
          out = await ws.execute('cat /ram/a.txt')
          if (out.exitCode !== 0 || dec.decode(out.stdout) !== 'hi\n') throw new Error('read smoke failed')
          console.log('OK: core smoke passed on bare install')
          JS

  gate:
    name: test-install-gate
    runs-on: ubuntu-latest
    needs: [changes, python-install, ts-install]
    if: always()
    steps:
      - name: Check required jobs
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          echo "$results"
          case "$results" in
            *failure*|*cancelled*) exit 1 ;;
          esac
